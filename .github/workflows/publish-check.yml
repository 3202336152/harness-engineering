name: Publish Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run publish readiness checks
        run: bash scripts/publish-check.sh
